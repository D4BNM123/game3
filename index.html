<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Aim Trainer — Bottom-Center Tracer to Crosshair</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{
      --bg:#0b0f14;
      --accent:#00d1ff;
      --text:#e6eef3;
      --muted:#9fb0bd;
      --glass: rgba(255,255,255,0.03);
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:var(--text);background:linear-gradient(180deg,#071018 0%, #0b0f14 100%);-webkit-font-smoothing:antialiased}
    #hud{position:fixed;left:12px;top:12px;padding:10px 12px;background:var(--glass);backdrop-filter:blur(6px);border-radius:10px;border:1px solid rgba(255,255,255,0.03);display:flex;gap:12px;align-items:center;z-index:60}
    #hud .stat{font-size:13px;color:var(--muted);min-width:84px}
    #hud .stat strong{color:var(--text);display:block;font-size:15px}
    #game-area{position:fixed;inset:0;cursor:crosshair;overflow:hidden}
    .target{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;user-select:none;touch-action:none;will-change:transform,opacity;box-shadow:0 6px 18px rgba(0,0,0,0.6), inset 0 -6px 12px rgba(0,0,0,0.15);border:2px solid rgba(255,255,255,0.06);z-index:30}
    .core{background:linear-gradient(180deg,#ff9b9b,#ff6b6b)}
    .ring{background:linear-gradient(180deg,#ffd166,#ffb86b)}
    .sniper{background:linear-gradient(180deg,#7be495,#3bd07a)}
    .tracer{position:absolute;height:3px;background:linear-gradient(90deg,var(--accent),rgba(0,209,255,0.2));transform-origin:left center;pointer-events:none;z-index:50}
    .piece{position:absolute;border-radius:50%;pointer-events:none;z-index:55}
    .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(2,6,10,0.6);z-index:70}
    .panel{width:min(720px,92%);background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 10px 40px rgba(0,0,0,0.6)}
    h1{margin:0 0 8px 0;font-size:22px}
    p{margin:6px 0;color:var(--muted)}
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    select,button{padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--text);font-size:15px;cursor:pointer}
    button.primary{background:linear-gradient(90deg,var(--accent),#6be7ff);color:#022;box-shadow:0 6px 18px rgba(0,209,255,0.08)}
    .small{padding:8px 10px;font-size:13px}
    @media (max-width:520px){#hud{flex-direction:column;left:8px;top:8px;padding:8px}.controls{flex-direction:column;align-items:stretch}}
  
    #ammo-hud{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:10px 16px;background:rgba(0,0,0,.35);border-radius:12px;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;z-index:65}
    #bullet-icon{font-size:20px;opacity:.7;transition:transform .08s,opacity .08s}
    #bullet-icon.flash{opacity:1;transform:scale(1.4)}

  </style>
</head>
<body>
  <div id="hud" aria-live="polite">
    <div class="stat"><strong id="score">0</strong><span>Score</span></div>
    <div class="stat"><strong id="time">30</strong><span>Time</span></div>
    <div class="stat"><strong id="accuracy">0%</strong><span>Accuracy</span></div>
    <div class="stat"><strong id="last-reaction">—</strong><span>Last RT (s)</span></div>
    <div class="stat"><strong id="avg-reaction">—</strong><span>Avg RT (s)</span></div>
    <div class="stat"><strong id="weapon-name">—</strong><span>Weapon</span></div>
    <div class="stat"><strong id="level-name">1</strong><span>Level</span></div>
  </div>

  <div id="game-area" tabindex="0" aria-label="Aim trainer play area"></div>
  <div id="ammo-hud"><span id="bullet-icon">•</span><strong id="ammo-display">9/27 bullets</strong></div>

  <div id="start-screen" class="overlay" role="dialog" aria-modal="true">
    <div class="panel" role="document">
      <h1>Aim Trainer — Bottom-Center Tracer</h1>
      <p>Choose a weapon and level. Press <strong>Start Game</strong> to begin. Press <kbd>Esc</kbd> during play to pause.</p>
      <div class="controls" style="align-items:center">
        <label>Weapon
          <select id="weapon-select" aria-label="Weapon select">
            <option value="pistol">Pistol — balanced</option>
            <option value="shotgun">Shotgun — big targets, low multiplier</option>
            <option value="sniper">Sniper — tiny targets, high multiplier</option>
            <option value="smg">SMG — fast respawn, moderate multiplier</option>
          </select>
        </label>
        <label>Level
          <select id="level-select" aria-label="Level select">
            <option value="1">Level 1 — relaxed</option>
            <option value="2">Level 2 — quicker</option>
            <option value="3">Level 3 — intense</option>
            <option value="4">Level 4 — extreme</option>
          </select>
        </label>
        <label>Duration
          <select id="duration-select" aria-label="Duration select">
            <option value="15">15s</option>
            <option value="30" selected>30s</option>
            <option value="60">60s</option>
          </select>
        </label>
      </div>
      <div style="display:flex;gap:10px;margin-top:12px;justify-content:center">
        <button id="start-btn" class="primary">Start Game</button>
        <button id="demo-btn" class="small">Demo Mode</button>
      </div>
    </div>
  </div>

  <div id="pause-screen" class="overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="panel">
      <h1>Paused</h1>
      <p>Press <kbd>Esc</kbd> to resume. Change weapon or restart from here.</p>
      <div class="controls">
        <label>Weapon
          <select id="pause-weapon-select" aria-label="Pause weapon select">
            <option value="pistol">Pistol</option>
            <option value="shotgun">Shotgun</option>
            <option value="sniper">Sniper</option>
            <option value="smg">SMG</option>
          </select>
        </label>
        <label>Level
          <select id="pause-level-select" aria-label="Pause level select">
            <option value="1">Level 1</option>
            <option value="2">Level 2</option>
            <option value="3">Level 3</option>
            <option value="4">Level 4</option>
          </select>
        </label>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:10px">
        <button id="pause-resume" class="primary">Resume</button>
        <button id="pause-restart" class="small">Restart</button>
        <button id="pause-menu" class="small">Back to Menu</button>
      </div>
    </div>
  </div>

  <div id="end-screen" class="overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="panel">
      <h1>Results</h1>
      <div id="results-summary" style="text-align:center"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
        <button id="end-restart" class="primary">Play Again</button>
        <button id="end-menu" class="small">Back to Menu</button>
      </div>
    </div>
  </div>

  <script>
    // DOM refs
    const gameArea = document.getElementById('game-area');
    const startScreen = document.getElementById('start-screen');
    const pauseScreen = document.getElementById('pause-screen');
    const endScreen = document.getElementById('end-screen');

    const startBtn = document.getElementById('start-btn');
    const demoBtn = document.getElementById('demo-btn');
    const weaponSelect = document.getElementById('weapon-select');
    const levelSelect = document.getElementById('level-select');
    const durationSelect = document.getElementById('duration-select');

    const pauseWeaponSelect = document.getElementById('pause-weapon-select');
    const pauseLevelSelect = document.getElementById('pause-level-select');
    const pauseResume = document.getElementById('pause-resume');
    const pauseRestart = document.getElementById('pause-restart');
    const pauseMenu = document.getElementById('pause-menu');

    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const accuracyEl = document.getElementById('accuracy');
    const lastReactionEl = document.getElementById('last-reaction');
    const avgReactionEl = document.getElementById('avg-reaction');
    const weaponNameEl = document.getElementById('weapon-name');
    const levelNameEl = document.getElementById('level-name');
    const ammoDisplay = document.getElementById('ammo-display');
    const bulletIcon = document.getElementById('bullet-icon');

    const resultsSummary = document.getElementById('results-summary');
    const endRestart = document.getElementById('end-restart');
    const endMenu = document.getElementById('end-menu');

    // State
    let running = false;
    let paused = false;
    let timerId = null;
    let respawnTimeout = null;
    let currentTarget = null;
    let spawnTimestamp = null;

    let score = 0;
    let shots = 0;
    let hits = 0;
    let timeLeft = 30;
    let duration = 30;

    let lastReaction = null;
    const reactions = [];

    const WEAPONS = {
      pistol: { size: 56, baseSpawn: 900, multiplier: 1, className: 'core', fireRate:9, ammo:'9/27 bullets' },
      shotgun: { size: 92, baseSpawn: 1200, multiplier: 0.6, className: 'ring', fireRate:8, ammo:'8/32 bullets' },
      sniper: { size: 28, baseSpawn: 1400, multiplier: 2.2, className: 'sniper', fireRate:5, ammo:'5/30 bullets' },
      smg: { size: 40, baseSpawn: 520, multiplier: 0.8, className: 'core', fireRate:30, ammo:'30/90 bullets' }
    };

    const LEVELS = {
      1: { speedFactor: 1.0 },
      2: { speedFactor: 0.78 },
      3: { speedFactor: 0.62 },
      4: { speedFactor: 0.48 }
    };

    let currentWeaponKey = 'pistol';
    let currentLevel = 1;

    function rand(min, max){ return Math.random() * (max - min) + min; }
    function clamp(v, a, b){ return Math.max(a, Math.min(b, v)); }
    function formatSeconds(s){ return (Math.round(s * 100) / 100).toFixed(2); }

    function flashBullet(){
      bulletIcon.classList.add('flash');
      setTimeout(()=>bulletIcon.classList.remove('flash'),100);
    }

    function updateAmmoHUD(){
      ammoDisplay.textContent = WEAPONS[currentWeaponKey].ammo;
    }

    function updateHUD(){
      scoreEl.textContent = Math.round(score);
      timeEl.textContent = Math.max(0, Math.ceil(timeLeft));
      const rawAcc = shots > 0 ? (hits / shots) * 100 : 0;
      const cappedAcc = Math.min(100, Math.round(rawAcc));
      accuracyEl.textContent = cappedAcc + '%';
      lastReactionEl.textContent = lastReaction === null ? '—' : formatSeconds(lastReaction);
      const avg = reactions.length ? reactions.reduce((a,b)=>a+b,0)/reactions.length : null;
      avgReactionEl.textContent = avg === null ? '—' : formatSeconds(avg);
      weaponNameEl.textContent = currentWeaponKey;
      levelNameEl.textContent = currentLevel;
      updateAmmoHUD();
    }

    // Gun origin: bottom-center (slightly above bottom so tracer is visible)
    function getGunOrigin(){
      const startX = Math.round(window.innerWidth / 2);
      const startY = Math.round(window.innerHeight - 12);
      return { x: startX, y: startY };
    }

    // Create tracer from (sx,sy) to (ex,ey)
    function createTracer(sx, sy, ex, ey){
      const dx = ex - sx;
      const dy = ey - sy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 6) return; // too short
      const angle = Math.atan2(dy, dx) * (180 / Math.PI);
      const tracer = document.createElement('div');
      tracer.className = 'tracer';
      // place tracer's left at sx, top at sy (adjusted so line is centered vertically)
      tracer.style.left = sx + 'px';
      tracer.style.top = (sy - 1.5) + 'px';
      tracer.style.width = dist + 'px';
      tracer.style.transform = `rotate(${angle}deg)`;
      tracer.style.opacity = '1';
      gameArea.appendChild(tracer);
      tracer.animate([
        { opacity: 1, transform: tracer.style.transform + ' scaleX(1)' },
        { opacity: 0, transform: tracer.style.transform + ' scaleX(0.98)' }
      ], { duration: 180, easing: 'ease-out', fill: 'forwards' });
      setTimeout(()=>{ if (tracer.parentElement) tracer.remove(); }, 220);
    }

    // When user clicks anywhere, draw tracer from bottom-center to the click (crosshair)
    function handleShot(ev, isAuto = false){
      if (!running || paused) return;
      // Count shot for misses (target handler counts hits)
      if (!isAuto && !ev.target.classList.contains('target')){
        shots++;
        updateHUD();
      }
      const origin = getGunOrigin();
      const destX = ev.clientX;
      const destY = ev.clientY;
      createTracer(origin.x, origin.y, destX, destY);
    }

    // Spawn target and record spawn time
    function spawnTarget(){
      removeTarget();
      if (!running || paused) return;

      const weapon = WEAPONS[currentWeaponKey];
      const size = weapon.size;
      const el = document.createElement('div');
      el.className = 'target ' + weapon.className;
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.left = Math.max(6, Math.random() * (window.innerWidth - size - 12)) + 'px';
      el.style.top = Math.max(6, Math.random() * (window.innerHeight - size - 12)) + 'px';
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', 'Target');

      el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" style="pointer-events:none">
        <circle cx="${size/2}" cy="${size/2}" r="${size/6}" fill="rgba(255,255,255,0.12)"/>
      </svg>`;

      el.addEventListener('pointerdown', (ev) => {
        ev.stopPropagation();
        if (!running || paused) return;
        // Count shot and hit
        shots++;
        hits++;
        // Reaction time
        const now = performance.now();
        if (spawnTimestamp !== null){
          const rt = (now - spawnTimestamp) / 1000;
          lastReaction = rt;
          reactions.push(rt);
        }
        // Score
        score += weapon.multiplier;
        updateHUD();
        flashBullet();
        // Draw tracer from gun origin to the crosshair (click position)
        const origin = getGunOrigin();
        createTracer(origin.x, origin.y, ev.clientX, ev.clientY);
        // Break animation
        breakTarget(el);
        // Schedule next spawn
        const spawnDelay = weapon.baseSpawn * LEVELS[currentLevel].speedFactor;
        respawnTimeout = setTimeout(() => { if (!running || paused) return; spawnTarget(); }, spawnDelay);
      });

      gameArea.appendChild(el);
      currentTarget = el;
      spawnTimestamp = performance.now();
    }

    // Simulated hit (demo)
    function simulateHitAt(x, y){
      if (!currentTarget) return;
      shots++;
      hits++;
      const now = performance.now();
      if (spawnTimestamp !== null){
        const rt = (now - spawnTimestamp) / 1000;
        lastReaction = rt;
        reactions.push(rt);
      }
      const weapon = WEAPONS[currentWeaponKey];
      score += weapon.multiplier;
      updateHUD();
      flashBullet();
      const origin = getGunOrigin();
      createTracer(origin.x, origin.y, x, y);
      breakTarget(currentTarget);
      const spawnDelay = weapon.baseSpawn * LEVELS[currentLevel].speedFactor;
      respawnTimeout = setTimeout(() => { if (!running || paused) return; spawnTarget(); }, spawnDelay);
    }

    // Break animation
    function breakTarget(targetEl){
      if (!targetEl) return;
      const rect = targetEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const pieceCount = clamp(Math.round(rect.width / 8), 4, 12);
      for (let i = 0; i < pieceCount; i++){
        const piece = document.createElement('div');
        piece.className = 'piece';
        const size = Math.max(6, Math.round(rect.width / (4 + Math.random()*3)));
        piece.style.width = size + 'px';
        piece.style.height = size + 'px';
        piece.style.left = (cx - size/2) + 'px';
        piece.style.top = (cy - size/2) + 'px';
        const w = WEAPONS[currentWeaponKey];
        let bg = '#ff6b6b';
        if (w.className === 'ring') bg = '#ffb86b';
        if (w.className === 'sniper') bg = '#3bd07a';
        piece.style.background = bg;
        piece.style.opacity = '1';
        gameArea.appendChild(piece);
        const angle = Math.random() * Math.PI * 2;
        const dist = rand(rect.width * 0.6, rect.width * 1.6);
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        const rot = rand(-720, 720);
        piece.animate([
          { transform: 'translate(0px,0px) rotate(0deg)', opacity: 1 },
          { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity: 0 }
        ], { duration: 520 + Math.random()*240, easing: 'cubic-bezier(.2,.8,.2,1)', fill: 'forwards' });
        setTimeout(()=>piece.remove(), 900);
      }
      if (targetEl && targetEl.parentElement) targetEl.remove();
      currentTarget = null;
      spawnTimestamp = null;
    }

    function removeTarget(){
      if (currentTarget && currentTarget.parentElement) currentTarget.remove();
      currentTarget = null;
      spawnTimestamp = null;
      if (respawnTimeout) { clearTimeout(respawnTimeout); respawnTimeout = null; }
    }

    // Pause/resume
    function togglePause(forceState){
      if (!running) return;
      paused = typeof forceState === 'boolean' ? forceState : !paused;
      if (paused){
        pauseScreen.style.display = 'flex';
        pauseWeaponSelect.value = currentWeaponKey;
        pauseLevelSelect.value = currentLevel;
      } else {
        pauseScreen.style.display = 'none';
        const newWeapon = pauseWeaponSelect.value;
        const newLevel = parseInt(pauseLevelSelect.value, 10);
        if (newWeapon !== currentWeaponKey){
          currentWeaponKey = newWeapon;
          if (currentTarget){
            const w = WEAPONS[currentWeaponKey];
            currentTarget.style.width = w.size + 'px';
            currentTarget.style.height = w.size + 'px';
          }
        }
        if (newLevel !== currentLevel){
          currentLevel = newLevel;
        }
      }
      updateHUD();
    }

    function restartRun(){
      running = false;
      paused = false;
      clearTimeout(timerId);
      clearTimeout(respawnTimeout);
      stopDemo();
      removeTarget();
      setTimeout(() => startGame(), 120);
    }

    function backToMenu(){
      running = false;
      paused = false;
      clearTimeout(timerId);
      clearTimeout(respawnTimeout);
      stopDemo();
      removeTarget();
      startScreen.style.display = 'flex';
      pauseScreen.style.display = 'none';
      endScreen.style.display = 'none';
      updateHUD();
    }

    // Start game
    function startGame({ demo = false } = {}){
      currentWeaponKey = weaponSelect.value;
      currentLevel = parseInt(levelSelect.value, 10);
      duration = parseInt(durationSelect.value, 10);
      pauseWeaponSelect.value = currentWeaponKey;
      pauseLevelSelect.value = currentLevel;
      score = 0; shots = 0; hits = 0;
      timeLeft = duration;
      running = true;
      paused = false;
      lastReaction = null;
      reactions.length = 0;
      startScreen.style.display = 'none';
      pauseScreen.style.display = 'none';
      endScreen.style.display = 'none';
      gameArea.focus();
      updateHUD();
      spawnTarget();
      function tick(){
        if (!running) return;
        if (!paused){
          timeLeft -= 0.1;
          if (timeLeft <= 0){
            timeLeft = 0;
            updateHUD();
            endGame();
            return;
          }
          updateHUD();
        }
        timerId = setTimeout(tick, 100);
      }
      tick();
      if (demo) demoAutoFire();
    }

    // Demo auto-fire
    let demoInterval = null;
    function demoAutoFire(){
      if (demoInterval) clearInterval(demoInterval);
      demoInterval = setInterval(() => {
        if (!running || paused) return;
        if (currentTarget){
          const rect = currentTarget.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          simulateHitAt(cx + rand(-6,6), cy + rand(-6,6));
        }
      }, 600);
    }
    function stopDemo(){ if (demoInterval) { clearInterval(demoInterval); demoInterval = null; } }

    function endGame(){
      running = false;
      paused = false;
      clearTimeout(timerId);
      clearTimeout(respawnTimeout);
      stopDemo();
      removeTarget();
      const rawAcc = shots > 0 ? (hits / shots) * 100 : 0;
      const cappedAcc = Math.min(100, Math.round(rawAcc));
      const avg = reactions.length ? reactions.reduce((a,b)=>a+b,0)/reactions.length : null;
      resultsSummary.innerHTML = `
        <div style="font-size:18px"><strong>Score:</strong> ${Math.round(score)}</div>
        <div style="font-size:15px;color:var(--muted)"><strong>Shots:</strong> ${shots} &nbsp; <strong>Hits:</strong> ${hits} &nbsp; <strong>Accuracy:</strong> ${cappedAcc}%</div>
        <div style="margin-top:8px;color:var(--muted)"><strong>Last RT:</strong> ${lastReaction === null ? '—' : formatSeconds(lastReaction) + 's'} &nbsp; <strong>Avg RT:</strong> ${avg === null ? '—' : formatSeconds(avg) + 's'}</div>
        <div style="margin-top:8px;color:var(--muted)"><strong>Weapon:</strong> ${currentWeaponKey} &nbsp; <strong>Level:</strong> ${currentLevel} &nbsp; <strong>Duration:</strong> ${duration}s</div>
      `;
      endScreen.style.display = 'flex';
    }

    // Wiring
    startBtn.addEventListener('click', () => startGame({ demo: false }));
    demoBtn.addEventListener('click', () => startGame({ demo: true }));
    pauseResume.addEventListener('click', () => togglePause(false));
    pauseRestart.addEventListener('click', () => { togglePause(false); restartRun(); });
    pauseMenu.addEventListener('click', () => backToMenu());
    endRestart.addEventListener('click', () => { endScreen.style.display = 'none'; startScreen.style.display = 'flex'; });
    endMenu.addEventListener('click', () => backToMenu());

    window.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape'){
        if (!running) {
          if (startScreen.style.display === 'none') startScreen.style.display = 'flex';
          return;
        }
        togglePause();
      }
      if (ev.key === ' ' && !running){
        ev.preventDefault();
        startGame();
      }
    });

    // Pointer handling: draw tracer from bottom-center to crosshair (click position)
    gameArea.addEventListener('pointerdown', (ev) => {
      if (!running || paused) return;
      flashBullet();
      // Always draw tracer from bottom-center to the click position (crosshair)
      const origin = getGunOrigin();
      createTracer(origin.x, origin.y, ev.clientX, ev.clientY);

      // If clicking on a target, its handler will also run (counts shot/hit).
      // For misses, count shot here.
      if (!ev.target.classList.contains('target')){
        shots++;
        updateHUD();
      }
    });

    window.addEventListener('resize', () => {
      if (currentTarget){
        const rect = currentTarget.getBoundingClientRect();
        const w = rect.width, h = rect.height;
        const left = clamp(rect.left, 6, window.innerWidth - w - 6);
        const top = clamp(rect.top, 6, window.innerHeight - h - 6);
        currentTarget.style.left = left + 'px';
        currentTarget.style.top = top + 'px';
      }
    });

    window.addEventListener('load', () => {
      gameArea.setAttribute('tabindex', '0');
      updateHUD();
    });

    pauseWeaponSelect.addEventListener('change', () => {
      const newWeapon = pauseWeaponSelect.value;
      if (currentTarget){
        const w = WEAPONS[newWeapon];
        currentTarget.style.width = w.size + 'px';
        currentTarget.style.height = w.size + 'px';
      }
    });

    gameArea.addEventListener('contextmenu', (e) => e.preventDefault());

    updateHUD();

    // Expose for debugging
    window._aimTrainer = { startGame, restartRun, backToMenu, togglePause, spawnTarget, endGame };
  </script>
</body>
</html>
